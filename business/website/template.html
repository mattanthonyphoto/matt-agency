<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{og_description}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{canonical}}">
  <meta property="og:site_name" content="Matt Anthony Photography">

  <!-- Canonical -->
  <link rel="canonical" href="{{canonical}}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Base Styles -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background: #1a1a18; color: #f6f4f0; font-family: 'DM Sans', -apple-system, sans-serif; overflow-x: hidden; }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; }
  </style>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231a1a18'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23c9a96e' font-family='serif' font-size='20' font-weight='300'%3EMA%3C/text%3E%3C/svg%3E">
</head>
<body>

{{header}}

{{content}}

<!-- Header JS (scroll behavior, mobile toggle) -->
<script>
(function(){
  var header = document.getElementById('maHeader');
  var toggle = document.getElementById('maToggle');
  var mobileNav = document.getElementById('maMobileNav');

  // Scroll behavior
  if (header) {
    window.addEventListener('scroll', function(){
      if (window.scrollY > 60) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });
  }

  // Mobile toggle
  if (toggle && mobileNav) {
    toggle.addEventListener('click', function(){
      toggle.classList.toggle('open');
      mobileNav.classList.toggle('open');
      document.body.style.overflow = mobileNav.classList.contains('open') ? 'hidden' : '';
    });

    // Close on link click
    mobileNav.querySelectorAll('a').forEach(function(link){
      link.addEventListener('click', function(){
        toggle.classList.remove('open');
        mobileNav.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  }

  // Dropdown hover for desktop
  var navItems = document.querySelectorAll('#maHeader .ma-nav-item');
  navItems.forEach(function(item){
    var dd = item.querySelector('.ma-dropdown');
    if (!dd) return;
    item.addEventListener('mouseenter', function(){ item.classList.add('active'); });
    item.addEventListener('mouseleave', function(){ item.classList.remove('active'); });
  });
})();
</script>

</body>
</html>
